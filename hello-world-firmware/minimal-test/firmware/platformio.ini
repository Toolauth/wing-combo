; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = espressif32
board = adafruit_feather_esp32s3_nopsram
framework = arduino
lib_deps = 
	bblanchon/ArduinoJson @ ^7.0.0
build_flags = 
	-D API_URL=\"http://cc.local/api\"
	-D WIFI_SSID=\"not_real\"
	-D WIFI_PASS=\"not_real\"
	-D OTA_PASSWORD=\"not_real\"
	-D API_BASE_URL=\"http://cc.local\"

[room_woodshop]
build_flags = ${env.build_flags} -D ROOM=\"woodshop\"

[room_metal]
build_flags = ${env.build_flags} -D ROOM=\"metalshop\"

[room_main]
build_flags = ${env.build_flags} -D ROOM=\"mainroom\"

[env:bridgeport_mill]
extends = room_metal
build_flags = 
	${room_metal.build_flags}
	-D TOOL_ID=\"mill_01\"
	-D NUM_ESTOPS=2
	-D HAS_NFC=1
lib_deps = 
	${env.lib_deps}
	adafruit/Adafruit PN532@^1.3.4
	bblanchon/ArduinoJson@^7.2.2
	briand/LibBriandIDF@^1.5.0
	knolleary/PubSubClient@^2.8

[env:sewing_machine]
extends = room_woodshop
build_flags = 
	${env.build_flags}
	-D TOOL_ID=\"sewing_01\"
	-D NUM_ESTOPS=0
lib_deps = 
	adafruit/Adafruit PN532@^1.3.4
	bblanchon/ArduinoJson@^7.2.2
	briand/LibBriandIDF@^1.5.0
	knolleary/PubSubClient@^2.8

[env:chopsaw]
extends = room_woodshop
build_flags = 
	${room_woodshop.build_flags}
	-D TOOL_ID=\"chopsaw_01\"
	-D NUM_ESTOPS=1
	-D HAS_NFC=1
lib_deps = 
	${env.lib_deps}
	adafruit/Adafruit PN532@^1.3.4
	bblanchon/ArduinoJson@^7.2.2
	briand/LibBriandIDF@^1.5.0
	knolleary/PubSubClient@^2.8
