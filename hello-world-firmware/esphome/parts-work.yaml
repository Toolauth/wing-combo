## ------ Sensors ---------------------
### I2C channel
i2c:
  sda: ${pin_sda}
  scl: ${pin_scl}
### Card Reader
pn532_i2c:
  update_interval: 1s
  on_tag:
    then:
      - text_sensor.template.publish:
          id: rfid_card
          state: !lambda "return format_hex(tag.get_uid());"
  on_tag_removed:
    then:
      - text_sensor.template.publish:
          id: rfid_card
          state: "no card"

text_sensor:
  - platform: template
    name: "RFID Card"
    id: rfid_card
    internal: false
    on_value:
      then:
        - lambda: |-
            ESP_LOGD("main", "The current RFID is %s", x.c_str());
### integrated ADE7953
sensor:
  - platform: ade7953_i2c
    irq_pin: ${pin_irq}
    voltage:
      name: test Voltage
    current_a:
      name: test Current A
    current_b:
      name: test Current B
    active_power_a:
      name: test Active Power A
      filters:
        - multiply: -1
    active_power_b:
      name: test Active Power B
      filters:
        - multiply: -1
    update_interval: 60s

### GPIO Sensors
binary_sensor:
  - platform: gpio
    id: bypass
    name: "bypass key"
    pin:
      number: ${pin_bypass_key}
      inverted: false
      mode:
        input: true
  - platform: gpio
    name: "1st E-Stop"
    pin:
      number: ${pin_estop_1}
      inverted: true
      mode:
        input: true
        pullup: false
  - platform: gpio
    name: "2nd E-Stop"
    pin:
      number: ${pin_estop_2}
      inverted: true
      mode:
        input: true
        pullup: false
  - platform: gpio
    name: "bin-cur"
    pin:
      number: ${pin_bin_cur}
      inverted: true
      mode:
        input: true
        pullup: false
  - platform: gpio
    name: "relay-feedback"
    pin:
      number: ${pin_relay_feedback}
      inverted: true
      mode:
        input: true
        pullup: true

## ----- Outputs ----------------------
### basic LEDs
light:
  - platform: binary
    output: red_led
    name: "Red LED"
  - platform: binary
    output: green_led
    name: "Green LED"

### relays for tool control
switch:
  - platform: gpio
    pin: ${pin_reset_relay}
    name: "reset relay"
  - platform: gpio
    pin: ${pin_set_relay}
    name: "set relay"

output:
### needed for LEDs to work
  - platform: gpio
    id: red_led
    pin: ${pin_red_led}
  - platform: gpio
    id: green_led
    pin: ${pin_green_led}
### needed for rtttl (buzzer)
  - platform: ledc
    pin: ${pin_buzzer}
    id: rtttl_out
rtttl:
  output: rtttl_out